<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Academia de Danza | Flow</title>
    <style>
        /* CONFIGURACIÓN BÁSICA */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: white;
            /* Esto hace que el scroll se detenga "pegado" en cada sección */
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start; /* El "iman" del scroll */
            position: relative;
            padding: 20px;
        }

        /* SECCIÓN 1: BIENVENIDA (PARALLAX CSS) */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=1000');
            background-size: cover;
            background-attachment: fixed; /* Esto crea el efecto Parallax básico */
            background-position: center;
        }

        .hero h1 {
            font-size: 4rem;
            letter-spacing: 10px;
            animation: aparecer 2s ease-out;
        }

        /* SECCIÓN 2: ESTILOS (SELECTOR INTERACTIVO) */
        .estilos { background: #111; }

        .contenedor-cartas {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .carta {
            width: 200px;
            height: 300px;
            background: #222;
            border: 1px solid #444;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            transition: all 0.5s ease; /* La magia de la interacción */
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Al pasar el mouse, la carta se estira */
        .carta:hover {
            width: 350px;
            border-color: #ff0055;
            box-shadow: 0 0 20px #ff0055;
        }

        .carta h3 {
            z-index: 2;
            font-size: 1.5rem;
        }

        /* Animación simple */
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* MENÚ DE NAVEGACIÓN FIJO */
        nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        nav a:hover { border-color: #ff0055; }

    </style>
</head>
<body>

    <nav>
        <a href="#inicio">INICIO</a>
        <a href="#estilos">DISCIPLINAS</a>
        <a href="#contacto">CONTACTO</a>
    </nav>

    <section id="inicio" class="hero">
        <h1>DANCE STUDIO</h1>
        <p>Desliza para descubrir el movimiento</p>
    </section>

    <section id="estilos" class="estilos">
        <h2>NUESTROS ESTILOS</h2>
        <div class="contenedor-cartas">
            <div class="carta" style="background-image: linear-gradient(transparent, black), url('https://images.unsplash.com/photo-1518834107812-67b0b7c58434?w=400'); background-size: cover;">
                <h3>BALLET</h3>
            </div>
            <div class="carta" style="background-image: linear-gradient(transparent, black), url('https://images.unsplash.com/photo-1535525153412-5a42439a210d?w=400'); background-size: cover;">
                <h3>URBAN</h3>
            </div>
            <div class="carta" style="background-image: linear-gradient(transparent, black), url('https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?w=400'); background-size: cover;">
                <h3>CONTEMPO</h3>
            </div>
        </div>
    </section>

    <section id="contacto">
        <h2>¿LISTO PARA BAILAR?</h2>
        <p style="margin-top: 20px;">Inscríbete hoy mismo y recibe una clase de prueba gratis.</p>
        <button style="margin-top: 30px; padding: 15px 40px; background: #ff0055; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 50px;">RESERVAR CLASE</button>
    </section>

</body>
</html>
