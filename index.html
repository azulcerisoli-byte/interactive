<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Cuarzo | Código SVG</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --cuarzo-bg: #fdfdfd;
            --cuarzo-text: #7a5a6b;
            --cuarzo-accent: #d1b8c8;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--cuarzo-bg);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Header Estático */
        .header-static {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            z-index: 100;
        }

        .header-static h1 {
            font-family: 'Merriweather', serif;
            color: var(--cuarzo-text);
            font-weight: 300;
            font-size: 28px;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
        }

        .carousel-viewport {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .discipline-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .discipline-slide.active {
            display: flex;
        }

        /* Texto de la Disciplina */
        .discipline-name {
            font-family: 'Merriweather', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--cuarzo-text);
            text-align: center;
            z-index: 5;
            font-weight: 300;
            opacity: 0;
            filter: blur(15px);
            position: absolute; /* Asegura que quede centrado estático */
        }

        .active .discipline-name {
            animation: textReveal 1s ease forwards;
            animation-delay: 0.8s;
        }

        @keyframes textReveal {
            0% { opacity: 0; filter: blur(15px); transform: scale(0.95); }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        /* =========================================
           EL BAILARÍN DIBUJADO CON CÓDIGO (SVG)
        ========================================= */
        .dancer-code {
            position: absolute;
            top: 50%;
            left: -300px; /* Empieza fuera por la izquierda */
            transform: translateY(-50%);
            width: 400px; /* Tamaño del dibujo */
            height: 400px;
            z-index: 10;
            pointer-events: none;
        }

        /* Animación del barrido para el SVG */
        .active .dancer-code {
            animation: sweepPass 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes sweepPass {
            0% { left: -400px; opacity: 0;}
            10% { opacity: 1;}
            90% { opacity: 1;}
            100% { left: 100vw; opacity: 0;}
        }

        /* Controles */
        .nav-controls {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--cuarzo-accent);
            color: var(--cuarzo-text);
            padding: 12px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background-color: var(--cuarzo-accent);
            color: white;
        }
    </style>
</head>
<body>

    <header class="header-static">
        <h1>Academia Cuarzo</h1>
    </header>

    <div class="carousel-viewport">
        
        <!-- Slide 1 -->
        <div class="discipline-slide active">
            <!-- AQUÍ ESTÁ EL DIBUJO HECHO CON MATEMÁTICAS (SVG) -->
            <svg class="dancer-code" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g fill="#d1b8c8" opacity="0.8">
                    <!-- Cabeza -->
                    <circle cx="50" cy="15" r="4" />
                    <!-- Brazos -->
                    <path d="M50 20 Q 30 10 20 5 Q 35 15 50 23 Q 65 15 80 5 Q 70 10 50 20" />
                    <!-- Torso y Falda (Tutú) -->
                    <path d="M48 23 Q 45 40 15 55 Q 50 65 85 55 Q 55 40 52 23 Z" />
                    <!-- Piernas -->
                    <path d="M45 55 L 35 90 L 37 92 L 48 58 Z" />
                    <path d="M55 55 L 60 85 L 62 84 L 52 58 Z" />
                </g>
            </svg>
            <div class="discipline-name">Clásico Inicial</div>
        </div>

        <!-- Slide 2 -->
        <div class="discipline-slide">
            <svg class="dancer-code" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Color ligeramente distinto para variar -->
                <g fill="#c2a3b7" opacity="0.8">
                    <circle cx="50" cy="15" r="4" />
                    <path d="M50 20 Q 30 10 20 5 Q 35 15 50 23 Q 65 15 80 5 Q 70 10 50 20" />
                    <path d="M48 23 Q 45 40 15 55 Q 50 65 85 55 Q 55 40 52 23 Z" />
                    <path d="M45 55 L 35 90 L 37 92 L 48 58 Z" />
                    <path d="M55 55 L 60 85 L 62 84 L 52 58 Z" />
                </g>
            </svg>
            <div class="discipline-name">Jazz Fusion</div>
        </div>

        <!-- Slide 3 -->
        <div class="discipline-slide">
             <svg class="dancer-code" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g fill="#b08d9e" opacity="0.8">
                    <circle cx="50" cy="15" r="4" />
                    <path d="M50 20 Q 30 10 20 5 Q 35 15 50 23 Q 65 15 80 5 Q 70 10 50 20" />
                    <path d="M48 23 Q 45 40 15 55 Q 50 65 85 55 Q 55 40 52 23 Z" />
                    <path d="M45 55 L 35 90 L 37 92 L 48 58 Z" />
                    <path d="M55 55 L 60 85 L 62 84 L 52 58 Z" />
                </g>
            </svg>
            <div class="discipline-name">Contemporáneo</div>
        </div>

        <!-- Slide 4 -->
        <div class="discipline-slide">
             <svg class="dancer-code" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g fill="#8f6a7d" opacity="0.8">
                    <circle cx="50" cy="15" r="4" />
                    <path d="M50 20 Q 30 10 20 5 Q 35 15 50 23 Q 65 15 80 5 Q 70 10 50 20" />
                    <path d="M48 23 Q 45 40 15 55 Q 50 65 85 55 Q 55 40 52 23 Z" />
                    <path d="M45 55 L 35 90 L 37 92 L 48 58 Z" />
                    <path d="M55 55 L 60 85 L 62 84 L 52 58 Z" />
                </g>
            </svg>
            <div class="discipline-name">Heels</div>
        </div>

    </div>

    <div class="nav-controls">
        <button class="nav-btn" onclick="moveSlide(-1)">Anterior</button>
        <button class="nav-btn" onclick="moveSlide(1)">Siguiente</button>
    </div>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.discipline-slide');

        function moveSlide(dir) {
            slides[current].classList.remove('active');
            current = (current + dir + slides.length) % slides.length;
            
            setTimeout(() => {
                slides[current].classList.add('active');
            }, 50);
        }
    </script>
</body>
</html>
