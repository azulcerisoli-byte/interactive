<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Cuarzo | Interfaz Interactiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,700;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header class="header-static">
        <h1>Academia Cuarzo</h1>
    </header>

    <div class="carousel-viewport">
        
        <div class="discipline-slide active" id="slide0">
            <div class="dancer-sweep ballet"></div>
            <div class="discipline-name">Clásico Inicial</div>
        </div>

        <div class="discipline-slide" id="slide1">
            <div class="dancer-sweep jazz"></div>
            <div class="discipline-name">Jazz Fusion</div>
        </div>

        <div class="discipline-slide" id="slide2">
            <div class="dancer-sweep contempo"></div>
            <div class="discipline-name">Contemporáneo</div>
        </div>

        <div class="discipline-slide" id="slide3">
            <div class="dancer-sweep heels"></div>
            <div class="discipline-name">Heels</div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" onclick="moveSlide(-1)">Anterior</button>
        <button class="nav-btn" onclick="moveSlide(1)">Siguiente</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.discipline-slide');

        function moveSlide(direction) {
            // Quitamos la clase activa de la diapositiva actual
            slides[currentSlide].classList.remove('active');
            
            // Calculamos cuál es la siguiente diapositiva
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            
            // Un pequeño retraso para que la animación se reinicie correctamente
            setTimeout(() => {
                slides[currentSlide].classList.add('active');
            }, 10);
        }
    </script>

</body>
</html>
