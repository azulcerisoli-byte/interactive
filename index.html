<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Cuarzo</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <h1 class="logo">Academia Cuarzo</h1>
    </header>

    <main class="carousel">
        <div class="slide active">
            <div class="dancer dancer-clasico"></div>
            <h2 class="discipline">Clásico Inicial</h2>
        </div>
        
        <div class="slide">
            <div class="dancer dancer-jazz"></div>
            <h2 class="discipline">Jazz Fusion</h2>
        </div>
        
        <div class="slide">
            <div class="dancer dancer-contemporaneo"></div>
            <h2 class="discipline">Contemporáneo</h2>
        </div>
        
        <div class="slide">
            <div class="dancer dancer-heels"></div>
            <h2 class="discipline">Heels</h2>
        </div>

        <button id="prevBtn" class="nav-btn">&#8249;</button>
        <button id="nextBtn" class="nav-btn">&#8250;</button>
    </main>

    <script>
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        let current = 0;

        function updateSlide(newIndex) {
            slides[current].classList.remove('active');
            
            // Este truco reinicia las animaciones de CSS al cambiar de diapositiva
            void slides[newIndex].offsetWidth; 
            
            current = newIndex;
            slides[current].classList.add('active');
        }

        prevBtn.addEventListener('click', () => {
            let newIndex = (current === 0) ? slides.length - 1 : current - 1;
            updateSlide(newIndex);
        });

        nextBtn.addEventListener('click', () => {
            let newIndex = (current === slides.length - 1) ? 0 : current + 1;
            updateSlide(newIndex);
        });
    </script>

</body>
</html>
